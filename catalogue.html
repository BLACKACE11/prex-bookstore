<!-- 🔝 BACK TO TOP BUTTON -->


<script>
/* 🔥 SLIDESHOW */
let images = [
    "images/shopnow.jpg",
    "images/coupon.jpg",
    "images/delivery.jpg"
];

let index = 0;
let slide = document.getElementById("slide");

setInterval(() => {
    // fade out
    slide.style.opacity = 0;

    setTimeout(() => {
        // change image
        index = (index + 1) % images.length;
        slide.src = images[index];

        // fade in
        slide.style.opacity = 1;
    }, 400); // half of transition time
}, 3000);

/* 🔝 SCROLL TO TOP */
topBtn.onclick = () => {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
};

const searchInput = document.getElementById("searchInput");
const books = document.querySelectorAll(".book-card",);

searchInput.addEventListener("input", () => {
    let value = searchInput.value.toLowerCase();
    let firstMatch = null;

    books.forEach(book => {
        let title = book.querySelector("h3").textContent.toLowerCase();

        if (value === "") {
            book.classList.remove("blur", "highlight");
        } 
        else if (title.includes(value)) {
            book.classList.remove("blur");
            book.classList.add("highlight");

            // store first match
            if (!firstMatch) {
                firstMatch = book;
            }
        } 
        else {
            book.classList.add("blur");
            book.classList.remove("highlight");
        }
    });

      // 🔥 SCROLL TO FIRST MATCH
    if (firstMatch) {
        firstMatch.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }
});


// Update cart count on all pages
function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const countElement = document.getElementById('cart-count');
  
  if (countElement) {
    countElement.textContent = cart.length;
    
    // Optional: Hide count if cart is empty
    if (cart.length === 0) {
      countElement.style.display = 'none';
    } else {
      countElement.style.display = 'flex';
    }
  }
}

// Run when page loads
window.addEventListener('load', updateCartCount);

// Also update when storage changes (useful for multiple tabs)
window.addEventListener('storage', updateCartCount);

</script>
