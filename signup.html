<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Prex</title>
</head>
<body>

  <h2>Sign Up to Prex</h2>
  
  <input type="email" id="email" placeholder="Email" style="padding:12px; margin:10px; width:80%;">
  <input type="password" id="password" placeholder="Password" style="padding:12px; margin:10px; width:80%;">
  
  <button onclick="signUp()" style="padding:14px; background:#8b5a2b; color:white; border:none; margin:10px;">Create Account</button>

  <script>
    alert("Page loaded successfully");

    async function signUp() {
      alert("Button clicked! JavaScript is working.");
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      alert("Email: " + email + "\nPassword length: " + password.length);
    }
  </script>
</body>
</html>
