<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Sign Up</h2>
  <input type="email" id="email" placeholder="Email" value="test@example.com"><br><br>
  <input type="password" id="password" placeholder="Password" value="123456"><br><br>
  
<button id="createBtn">Create Account</button>

 <script>
  // Supabase Setup
  const supabaseUrl = 'https://ppinkzelfpvrwqhevm.supabase.co';
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Your full key

  const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

  document.getElementById('createBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert("Please enter email and password");
      return;
    }

    alert("Attempting signup...");

    try {
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert("Success! Check your email for confirmation.");
      }
    } catch (err) {
      alert("Failed: " + err.message);
    }
  });
</script>
 
</body>
</html>
