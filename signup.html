<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Prex</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Sign Up to Prex</h2>
  
  <input type="email" id="email" placeholder="Email address" style="width:90%; padding:12px; margin:10px;">
  <input type="password" id="password" placeholder="Password" style="width:90%; padding:12px; margin:10px;">
  
  <button onclick="signUp()" style="width:90%; padding:14px; background:#8b5a2b; color:white; border:none; margin:10px;">Create Account</button>

  <script>
    const supabaseUrl = 'https://ppinkzelfpvrwqhevm.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ← YOUR FULL ANON KEY HERE

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

    async function signUp() {
      alert("Button clicked! Starting signup...");

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          alert("Sign up failed: " + error.message);
        } else {
          alert("Sign up successful! Please check your email.");
        }
      } catch (err) {
        alert("An error occurred. Please try again.");
      }
    }
  </script>
</body>
</html>
