<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Sign Up Test</h2>
  
  <input type="email" id="email" placeholder="Email" value="test@example.com"><br><br>
  <input type="password" id="password" placeholder="Password" value="123456"><br><br>
  
  <button onclick="signUp()">Create Account</button>

  <script>
    alert("Page loaded - JavaScript is running");

    const supabaseUrl = 'https://ppinkzelfepvrlwqhevm.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwaW5remVsZmVwdnJsd3FoZXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTA5MjcsImV4cCI6MjA5MjQ2NjkyN30.BqBWWlINcDLgmhe9fjmDrEL6uIC6YZ9SHgMGh1ghKQI'; // Paste full key

    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    async function signUp() {
      alert("Button clicked!");

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) alert("Error: " + error.message);
        else alert("Success! Check email.");
      } catch (e) {
        alert("Failed: " + e.message);
      }
    }
  </script>
</body>
</html>
