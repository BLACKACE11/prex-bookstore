<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Sign Up Test</h2>
  <input type="email" id="email" placeholder="Email" value="test@example.com">
  <input type="password" id="password" placeholder="Password" value="123456">
  <button onclick="testSignUp()">Create Account</button>

  <script>
    const supabaseUrl = 'https://ppinkzelfpvrwqhevm.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwaW5remVsZmVwdnJsd3FoZXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTA5MjcsImV4cCI6MjA5MjQ2NjkyN30.BqBWWlINcDLgmhe9fjmDrEL6uIC6YZ9SHgMGh1ghKQI'; // ← Paste your full anon key

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

    async function testSignUp() {
      alert("Button clicked! Function is running...");   // This should always show

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          alert("Supabase Error: " + error.message);
        } else {
          alert("Success! Check your email.");
        }
      } catch (err) {
        alert("JavaScript Error: " + err.message);
      }
    }
  </script>
</body>
</html>
