<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Sign Up</h2>
  <input type="email" id="email" placeholder="Email" value="test@example.com"><br><br>
  <input type="password" id="password" placeholder="Password" value="123456"><br><br>
  
<button id="createBtn">Create Account</button>

<script>
  // Supabase Setup
  const supabaseUrl = 'https://ppinkzelfpvrwqhevm.supabase.co';
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ← Your full anon key

  const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);   // ← Note: lowercase 'supabase'

  async function signUp() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert("Please enter email and password");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters");
      return;
    }

    try {
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        alert("Sign up failed: " + error.message);
      } else {
        alert("Sign up successful! Please check your email to confirm your account.");
      }
    } catch (err) {
      alert("Error: " + err.message);
    }
  }
</script>
 
</body>
</html>
