<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Prex</title>
</head>
<body>

  <h2>Sign Up to Prex</h2>
  
  <input type="email" id="email" placeholder="Email" style="padding:12px; margin:10px; width:80%;">
  <input type="password" id="password" placeholder="Password" style="padding:12px; margin:10px; width:80%;">
  
  <button onclick="signUp()" style="padding:14px; background:#8b5a2b; color:white; border:none; margin:10px;">Create Account</button>

  <script>
  const supabaseUrl = 'https://ppinkzelfepvrlwqhevm.supabase.co';
  const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwaW5remVsZmVwdnJsd3FoZXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTA5MjcsImV4cCI6MjA5MjQ2NjkyN30.BqBWWlINcDLgmhe9fjmDrEL6uIC6YZ9SHgMGh1ghKQI'; // ← Paste your FULL anon key here

  const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

  async function signUp() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email || !password) {
      alert("Please enter email and password");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters");
      return;
    }

    try {
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        alert("Sign up failed: " + error.message);
      } else {
        alert("Sign up successful! Please check your email to confirm your account.");
        // Redirect to home after success
        window.location.href = "index.html";
      }
    } catch (err) {
      alert("An error occurred. Please try again.");
    }
  }
</script>
</body>
</html>
