<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading - Prex</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .reader { max-width: 800px; margin: 40px auto; padding: 40px; background: #f9f6f0; border-radius: 12px; line-height: 1.9; }
    .review-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 3000; }
    .stars { font-size: 2rem; cursor: pointer; }
  </style>
</head>
<body>

<div class="reader" id="reader-content">
  <h1 id="bookTitle" style="text-align:center;"></h1>
  <div id="bookText" style="margin-top:30px;"></div>
</div>

<!-- Exit Review Modal -->
<div id="reviewModal" class="review-modal">
  <div style="background:white; padding:30px; border-radius:16px; max-width:500px; width:90%; text-align:center;">
    <h2>How was the book?</h2>
    <div class="stars" id="starRating">★★★★☆</div>
    <textarea id="reviewText" rows="4" placeholder="Write your review here..." style="width:100%; margin:20px 0; padding:12px;"></textarea>
    <button onclick="submitReview()" style="background:#8b5a2b; color:white; padding:12px 30px; border:none; border-radius:8px;">Save Review & Exit</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const bookId = urlParams.get('book');

  const booksData = {
    tagyoureit: { title: "Tag, You're It!", content: "<p>Chapter 1 content here...</p><p>More story content...</p>" },
    sly: { title: "SLY", content: "<p>SLY book content here...</p>" },
    // Add more books as needed
  };

  const book = booksData[bookId] || { title: "Book Not Found", content: "<p>This book is not available.</p>" };

  document.getElementById('bookTitle').textContent = book.title;
  document.getElementById('bookText').innerHTML = book.content;

  let currentProgress = 0;

  // Track reading progress
  window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    currentProgress = Math.min(Math.floor((scrollTop / docHeight) * 100), 100);
  });

  // Show review when user tries to leave
  window.onbeforeunload = () => {
    if (currentProgress > 5) {
      document.getElementById('reviewModal').style.display = 'flex';
      return "Do you want to save your progress and review?";
    }
  };

  function submitReview() {
    const rating = document.getElementById('starRating').textContent.trim().length;
    const reviewText = document.getElementById('reviewText').value;

    let purchased = JSON.parse(localStorage.getItem('purchasedBooks')) || {};
    if (purchased[bookId]) {
      purchased[bookId].progress = currentProgress;
      purchased[bookId].rating = rating;
      purchased[bookId].review = reviewText || "";
    }
    localStorage.setItem('purchasedBooks', JSON.stringify(purchased));

    alert("Thank you for your review!");
    window.location.href = 'my-books.html';
  }
</script>
</body>
</html>
