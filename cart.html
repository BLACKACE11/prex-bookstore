<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Prex Book Store</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
    .cart-item { display: flex; gap: 20px; background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); align-items: center; }
    .cart-item img { width: 90px; border-radius: 8px; }
    .remove-btn { background: #e63939; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-left: auto;}
    .total-section { margin-top: 40px; text-align: right; font-size: 1.5rem; }
    .checkout-btn { background: #d97757; color: white; padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="cart-container">
    <h1>Your Cart</h1>
    <div id="cart-items"></div>

    <div class="total-section">
      <p>Total: <strong id="total-price">₦0</strong></p>
      <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
    </div>
  </div>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-items');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart">Your cart is empty 😕<br><a href="catalogue.html">Browse Books</a></div>`;
        document.getElementById('total-price').textContent = '₦0';
        return;
      }

      let total = 0;

      cart.forEach((item, index) => {
        total += item.price;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.image}" alt="${item.title}">
          <div class="cart-details">
            <h3>${item.title}</h3>
            <p>${item.format}</p>
            <p class="price">$${item.price}</p>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total-price').textContent = `$${total}`;
    }

    function removeFromCart(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    // New: Proceed to Checkout from Cart
    async function proceedToCheckout() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }

      // For simplicity, we'll process all items together (you can improve later)
      const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);

      // Go to payment page with cart data
      const queryString = `cart=true&total=${totalAmount}`;
      window.location.href = `payment.html?${queryString}`;
    }

    window.onload = loadCart;
  </script>
</body>
</html>
