<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Books - Prex Book Store</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .my-books-container { max-width: 1100px; margin: 40px auto; padding: 20px; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
    .my-book-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s;
    }
    .my-book-card:hover { transform: translateY(-8px); }
    .my-book-card img { width: 100%; height: 280px; object-fit: cover; }
    .my-book-info { padding: 12px; text-align: center; }
    .progress-bar {
      height: 8px;
      background: #ddd;
      border-radius: 10px;
      margin: 10px 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #8b5a2b;
      transition: width 0.4s;
    }
  </style>
</head>
<body>

  <div class="my-books-container">
    <h1 style="color: #8b5a2b;">My Books</h1><br>
    <div id="my-books-grid" class="book-grid"></div>
  </div>

  <script>
    function loadMyBooks() {
      const purchased = JSON.parse(localStorage.getItem('purchasedBooks')) || {};
      const container = document.getElementById('my-books-grid');
      container.innerHTML = '';

      if (Object.keys(purchased).length === 0) {
        container.innerHTML = `<p style="text-align:center; grid-column:1/-1; padding:60px;">You haven't purchased any books yet.<br><a href="catalogue.html">Browse Books</a></p>`;
        return;
      }

      Object.keys(purchased).forEach(bookId => {
        const book = purchased[bookId];
        const progress = book.progress || 0;

        const card = document.createElement('div');
        card.className = 'my-book-card';
        card.innerHTML = `
          <img src="\( {book.image || 'images/tagyoureit.jpg'}" alt=" \){book.title}">
          <div class="my-book-info">
            <h3>${book.title}</h3>
            <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
            <small>${progress}% read</small>
          </div>
        `;
        card.onclick = () => window.location.href = `reader.html?book=${bookId}`;
        container.appendChild(card);
      });
    }

    window.onload = loadMyBooks;
  </script>
</body>
</html>
